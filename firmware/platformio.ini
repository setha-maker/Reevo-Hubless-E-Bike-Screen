; Reevo Dashboard — ESP32-S3 firmware
; Target board: 2.8" CYD with ESP32-S3, 240x320 capacitive touch, 8MB PSRAM
; (a.k.a. Sunton ESP32-S3-2432S028C / JC2432W328C)

[platformio]
default_envs = reevo

[env:reevo]
platform           = espressif32@^6.7.0
board              = esp32-s3-devkitc-1
framework          = arduino
monitor_speed      = 115200
upload_speed       = 921600
upload_port        = /dev/cu.usbmodem101
monitor_port       = /dev/cu.usbmodem101
monitor_filters    = esp32_exception_decoder, time

; ESP32-S3 with 8MB PSRAM + 8MB flash. Huge app partition gives us room
; to grow without re-flashing partition tables.
board_build.partitions = huge_app.csv
board_build.mcu       = esp32s3
board_build.f_cpu     = 240000000L
board_build.flash_mode = qio
board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216
board_build.flash_size  = 16MB

; Enable native USB CDC for printf() over USB-C without a separate UART.
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DBOARD_HAS_PSRAM
    -DCORE_DEBUG_LEVEL=3                 ; INFO
    -DCONFIG_BT_NIMBLE_MAX_CONNECTIONS=1
    -DCONFIG_BT_NIMBLE_ROLE_OBSERVER=1
    -DCONFIG_BT_NIMBLE_ROLE_CENTRAL=1
    ; LovyanGFX board profile is set in code (include/lgfx_board.h) so
    ; we can swap pinouts without touching the library.

lib_deps =
    lovyan03/LovyanGFX@^1.2.0
    h2zero/NimBLE-Arduino@^1.4.2
